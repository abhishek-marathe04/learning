<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Initialization and warm-up of m and v across the first few training steps</title>
<desc>Diagram showing m and v both starting at zero, then growing toward the true gradient signal step by step, with bias correction closing the gap between raw and hat values.</desc>
<style>
.t{font-family:sans-serif;font-size:14px}
.ts{font-family:sans-serif;font-size:12px}
.th{font-family:sans-serif;font-size:14px;font-weight:500}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="40" y="32" fill="#3d3d3a">Before training: m[i] = 0.0, v[i] = 0.0 for every parameter</text>

<line x1="60" y1="60" x2="620" y2="60" stroke="#73726c" stroke-width="0.5" opacity="0.3"/>

<g><rect x="40" y="80" width="100" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="90" y="100" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">step 0</text></g>
<g><rect x="220" y="80" width="100" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="270" y="100" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">step 1</text></g>
<g><rect x="400" y="80" width="100" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="450" y="100" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">step 2</text></g>
<g><rect x="560" y="80" width="60" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="590" y="100" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">...</text></g>

<line x1="90" y1="120" x2="90" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="270" y1="120" x2="270" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="120" x2="450" y2="150" class="arr" marker-end="url(#arrow)"/>

<g><rect x="20" y="150" width="140" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="90" y="168" text-anchor="middle" dominant-baseline="central" fill="#0C447C">m = 0.300</text>
<text class="ts" x="90" y="186" text-anchor="middle" dominant-baseline="central" fill="#185FA5">15% of grad=2.0</text></g>

<g><rect x="200" y="150" width="140" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="270" y="168" text-anchor="middle" dominant-baseline="central" fill="#0C447C">m = 0.555</text>
<text class="ts" x="270" y="186" text-anchor="middle" dominant-baseline="central" fill="#185FA5">closer to 2.0</text></g>

<g><rect x="380" y="150" width="140" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="450" y="168" text-anchor="middle" dominant-baseline="central" fill="#0C447C">m = 0.772</text>
<text class="ts" x="450" y="186" text-anchor="middle" dominant-baseline="central" fill="#185FA5">still climbing</text></g>

<line x1="90" y1="206" x2="90" y2="240" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="270" y1="206" x2="270" y2="240" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="450" y1="206" x2="450" y2="240" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<g><rect x="20" y="240" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="90" y="258" text-anchor="middle" dominant-baseline="central" fill="#3C3489">m_hat = 2.000</text>
<text class="ts" x="90" y="276" text-anchor="middle" dominant-baseline="central" fill="#534AB7">divide by 0.15</text></g>

<g><rect x="200" y="240" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="270" y="258" text-anchor="middle" dominant-baseline="central" fill="#3C3489">m_hat = 2.000</text>
<text class="ts" x="270" y="276" text-anchor="middle" dominant-baseline="central" fill="#534AB7">divide by 0.2775</text></g>

<g><rect x="380" y="240" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="450" y="258" text-anchor="middle" dominant-baseline="central" fill="#3C3489">m_hat = 2.000</text>
<text class="ts" x="450" y="276" text-anchor="middle" dominant-baseline="central" fill="#534AB7">divide by 0.3859</text></g>

<text class="ts" x="340" y="320" text-anchor="middle" fill="#73726c">true gradient was 2.0 at every step &#8212; m_hat recovers it immediately, raw m does not</text>

<line x1="60" y1="345" x2="620" y2="345" stroke="#73726c" stroke-width="0.5" opacity="0.3"/>

<g><rect x="20" y="365" width="140" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="90" y="383" text-anchor="middle" dominant-baseline="central" fill="#712B13">v = 0.0400</text>
<text class="ts" x="90" y="401" text-anchor="middle" dominant-baseline="central" fill="#993C1D">1% of grad&#178;=4.0</text></g>

<g><rect x="200" y="365" width="140" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="270" y="383" text-anchor="middle" dominant-baseline="central" fill="#712B13">v = 0.0796</text>
<text class="ts" x="270" y="401" text-anchor="middle" dominant-baseline="central" fill="#993C1D">still warming up</text></g>

<g><rect x="380" y="365" width="140" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="450" y="383" text-anchor="middle" dominant-baseline="central" fill="#712B13">v = 0.1188</text>
<text class="ts" x="450" y="401" text-anchor="middle" dominant-baseline="central" fill="#993C1D">slow climb, beta2=0.99</text></g>

<text class="ts" x="340" y="440" text-anchor="middle" fill="#73726c">v warms up much slower than m because beta2 (0.99) &#62; beta1 (0.85)</text>
</svg>