<svg width="100%" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Adam optimizer update pipeline for a single parameter</title>
<desc>Flowchart showing how a raw gradient flows into momentum (m) and variance (v) running averages, gets bias-corrected, and produces the final parameter update.</desc>
<style>
.t{font-family:sans-serif;font-size:14px}
.ts{font-family:sans-serif;font-size:12px}
.th{font-family:sans-serif;font-size:14px;font-weight:500}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g><rect x="270" y="20" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">p.grad</text></g>

<line x1="340" y1="64" x2="190" y2="110" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="64" x2="490" y2="110" class="arr" marker-end="url(#arrow)"/>

<g><rect x="100" y="110" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="190" y="128" text-anchor="middle" dominant-baseline="central" fill="#0C447C">m[i] (momentum)</text>
<text class="ts" x="190" y="146" text-anchor="middle" dominant-baseline="central" fill="#185FA5">running avg of gradients</text></g>

<g><rect x="400" y="110" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="490" y="128" text-anchor="middle" dominant-baseline="central" fill="#712B13">v[i] (variance)</text>
<text class="ts" x="490" y="146" text-anchor="middle" dominant-baseline="central" fill="#993C1D">running avg of squared grads</text></g>

<text class="ts" x="190" y="184" text-anchor="middle" fill="#73726c">beta1 = 0.85</text>
<text class="ts" x="490" y="184" text-anchor="middle" fill="#73726c">beta2 = 0.99</text>

<line x1="190" y1="166" x2="190" y2="220" class="arr" marker-end="url(#arrow)"/>
<line x1="490" y1="166" x2="490" y2="220" class="arr" marker-end="url(#arrow)"/>

<g><rect x="100" y="220" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="190" y="238" text-anchor="middle" dominant-baseline="central" fill="#0C447C">m_hat</text>
<text class="ts" x="190" y="256" text-anchor="middle" dominant-baseline="central" fill="#185FA5">bias-corrected momentum</text></g>

<g><rect x="400" y="220" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="490" y="238" text-anchor="middle" dominant-baseline="central" fill="#712B13">v_hat</text>
<text class="ts" x="490" y="256" text-anchor="middle" dominant-baseline="central" fill="#993C1D">bias-corrected variance</text></g>

<line x1="190" y1="276" x2="300" y2="340" class="arr" marker-end="url(#arrow)"/>
<line x1="490" y1="276" x2="380" y2="340" class="arr" marker-end="url(#arrow)"/>

<g><rect x="190" y="340" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="358" text-anchor="middle" dominant-baseline="central" fill="#3C3489">step = m_hat / (sqrt(v_hat) + eps)</text>
<text class="ts" x="340" y="376" text-anchor="middle" dominant-baseline="central" fill="#534AB7">direction scaled by inverse volatility</text></g>

<line x1="340" y1="396" x2="340" y2="440" class="arr" marker-end="url(#arrow)"/>

<g><rect x="230" y="440" width="220" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="340" y="458" text-anchor="middle" dominant-baseline="central" fill="#27500A">p.data -= lr_t * step</text>
<text class="ts" x="340" y="476" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">parameter actually moves</text></g>

<text class="ts" x="340" y="525" text-anchor="middle" fill="#73726c">Two signals from one gradient: direction (m) and confidence (v)</text>
</svg>