<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Autoregressive inference loop: sample a token, feed it back as the next input</title>
<desc>Diagram showing the inference cycle starting from BOS, running the model to get logits, applying temperature and softmax, sampling a token, and feeding that token back in as the next input, repeating until BOS is produced again.</desc>
<style>
.t{font-family:sans-serif;font-size:14px}
.ts{font-family:sans-serif;font-size:12px}
.th{font-family:sans-serif;font-size:14px;font-weight:500}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g><rect x="270" y="30" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">start: token = BOS</text></g>

<line x1="340" y1="74" x2="340" y2="110" class="arr" marker-end="url(#arrow)"/>

<g><rect x="240" y="110" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central" fill="#0C447C">gpt(token, pos)</text>
<text class="ts" x="340" y="146" text-anchor="middle" dominant-baseline="central" fill="#185FA5">forward pass, no backward</text></g>

<line x1="340" y1="166" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>

<g><rect x="240" y="200" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central" fill="#085041">logits / temperature</text>
<text class="ts" x="340" y="236" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">then softmax to probs</text></g>

<line x1="340" y1="256" x2="340" y2="290" class="arr" marker-end="url(#arrow)"/>

<g><rect x="240" y="290" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="340" y="308" text-anchor="middle" dominant-baseline="central" fill="#712B13">sample next token</text>
<text class="ts" x="340" y="326" text-anchor="middle" dominant-baseline="central" fill="#993C1D">random.choices(weights=probs)</text></g>

<path d="M240,318 Q120,318 120,200 Q120,80 268,52" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="60" y="190" fill="#73726c">feed token</text>
<text class="ts" x="60" y="204" fill="#73726c">back in</text>

<line x1="440" y1="318" x2="540" y2="318" class="arr" marker-end="url(#arrow)"/>
<g><rect x="540" y="290" width="100" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="590" y="308" text-anchor="middle" dominant-baseline="central" fill="#633806">token == BOS?</text>
<text class="ts" x="590" y="326" text-anchor="middle" dominant-baseline="central" fill="#854F0B">stop sample</text></g>

<text class="ts" x="340" y="380" text-anchor="middle" fill="#73726c">repeats until BOS sampled again or block_size positions reached</text>
</svg>