<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 560" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">LoRA Training: One Iteration Step by Step</text>

  <!-- ==================== STEP 1: FORWARD PASS ==================== -->
  <text x="430" y="58" text-anchor="middle" font-size="13" fill="#378ADD" font-weight="600">Step 1 — Forward Pass (x flows through both paths simultaneously)</text>

  <!-- x -->
  <rect x="30" y="70" width="64" height="48" rx="6" fill="#F1EFE8" stroke="#888" stroke-width="1"/>
  <text x="62" y="99" text-anchor="middle" font-size="16" font-weight="700" fill="#444">x</text>

  <!-- x → W -->
  <line x1="94" y1="86" x2="156" y2="80" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- W box -->
  <rect x="156" y="64" width="110" height="60" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="211" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#444">W</text>
  <text x="211" y="108" text-anchor="middle" font-size="10" fill="#888">frozen — 7B params</text>

  <!-- W → + -->
  <line x1="266" y1="94" x2="430" y2="94" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="348" y="88" text-anchor="middle" font-size="10" fill="#378ADD">W·x</text>

  <!-- x → A -->
  <line x1="94" y1="102" x2="156" y2="134" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <!-- A box -->
  <rect x="156" y="118" width="80" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="196" y="144" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">A</text>
  <text x="196" y="162" text-anchor="middle" font-size="10" fill="#0F6E56">d × r, random init</text>

  <!-- A → B -->
  <line x1="236" y1="148" x2="300" y2="148" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <!-- B box -->
  <rect x="300" y="118" width="80" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="340" y="144" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">B</text>
  <text x="340" y="162" text-anchor="middle" font-size="10" fill="#0F6E56">r × d, zero init</text>

  <!-- B → + -->
  <line x1="380" y1="148" x2="430" y2="112" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="408" y="140" text-anchor="middle" font-size="10" fill="#1D9E75">B·A·x</text>

  <!-- + node -->
  <rect x="430" y="78" width="54" height="48" rx="6" fill="#F1EFE8" stroke="#888" stroke-width="1"/>
  <text x="457" y="107" text-anchor="middle" font-size="20" font-weight="600" fill="#444">+</text>

  <!-- + → Loss -->
  <line x1="484" y1="102" x2="554" y2="102" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Loss box -->
  <rect x="554" y="74" width="150" height="56" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="629" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#712B13">Loss</text>
  <text x="629" y="114" text-anchor="middle" font-size="10" fill="#993C1D">compare output to target answer</text>

  <!-- ==================== STEP 2: BACKWARD PASS ==================== -->
  <line x1="30" y1="210" x2="830" y2="210" stroke="#f0f0f0" stroke-width="1"/>
  <text x="430" y="232" text-anchor="middle" font-size="13" fill="#EF9F27" font-weight="600">Step 2 — Backward Pass (gradient flows back, but W is blocked)</text>

  <!-- Loss → grad flows back -->
  <rect x="554" y="248" width="150" height="56" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="629" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">Loss</text>
  <text x="629" y="288" text-anchor="middle" font-size="10" fill="#993C1D">∂L/∂output computed</text>

  <!-- grad arrow back through + -->
  <line x1="554" y1="276" x2="494" y2="276" stroke="#EF9F27" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr-amber)"/>

  <!-- + node (backward) -->
  <rect x="440" y="252" width="54" height="48" rx="6" fill="#F1EFE8" stroke="#888" stroke-width="1"/>
  <text x="467" y="281" text-anchor="middle" font-size="20" fill="#444">+</text>

  <!-- grad to B path -->
  <line x1="440" y1="290" x2="380" y2="310" stroke="#EF9F27" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr-amber)"/>
  <!-- B backward -->
  <rect x="290" y="296" width="90" height="54" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="335" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">B</text>
  <text x="335" y="338" text-anchor="middle" font-size="10" fill="#854F0B">∂L/∂B computed</text>

  <!-- grad to A path -->
  <line x1="290" y1="323" x2="230" y2="323" stroke="#EF9F27" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr-amber)"/>
  <!-- A backward -->
  <rect x="140" y="296" width="90" height="54" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="185" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">A</text>
  <text x="185" y="338" text-anchor="middle" font-size="10" fill="#854F0B">∂L/∂A computed</text>

  <!-- grad tries to go to W (W path from +) -->
  <line x1="440" y1="265" x2="330" y2="258" stroke="#EF9F27" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- W backward (blocked) -->
  <rect x="140" y="240" width="120" height="54" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="200" y="263" text-anchor="middle" font-size="13" font-weight="600" fill="#444">W</text>
  <text x="200" y="281" text-anchor="middle" font-size="10" fill="#888">frozen</text>

  <!-- BLOCKED label -->
  <line x1="310" y1="250" x2="260" y2="265" stroke="#E24B4A" stroke-width="1.5"/>
  <rect x="30" y="256" width="112" height="28" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
  <text x="86" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#A32D2D">gradient blocked ✕</text>

  <!-- ==================== STEP 3: UPDATE ==================== -->
  <line x1="30" y1="380" x2="830" y2="380" stroke="#f0f0f0" stroke-width="1"/>
  <text x="430" y="400" text-anchor="middle" font-size="13" fill="#1D9E75" font-weight="600">Step 3 — Weight Update (only A and B change)</text>

  <!-- W unchanged -->
  <rect x="60" y="418" width="160" height="64" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="140" y="444" text-anchor="middle" font-size="13" font-weight="600" fill="#444">W — unchanged</text>
  <text x="140" y="462" text-anchor="middle" font-size="10" fill="#888">identical to before training</text>
  <text x="140" y="476" text-anchor="middle" font-size="10" fill="#888">all 7B values the same</text>

  <!-- A updated -->
  <rect x="280" y="418" width="160" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="360" y="444" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">A — updated ✓</text>
  <text x="360" y="462" text-anchor="middle" font-size="10" fill="#0F6E56">A_new = A - lr × ∂L/∂A</text>
  <text x="360" y="476" text-anchor="middle" font-size="10" fill="#0F6E56">small nudge toward confluence</text>

  <!-- B updated -->
  <rect x="500" y="418" width="160" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="580" y="444" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">B — updated ✓</text>
  <text x="580" y="462" text-anchor="middle" font-size="10" fill="#0F6E56">B_new = B - lr × ∂L/∂B</text>
  <text x="580" y="476" text-anchor="middle" font-size="10" fill="#0F6E56">moves away from zero init</text>

  <!-- repeat note -->
  <rect x="700" y="418" width="130" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="765" y="444" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">repeat for</text>
  <text x="765" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">all batches</text>
  <text x="765" y="478" text-anchor="middle" font-size="10" fill="#3C3489">↻ next iteration</text>

  <!-- key insight box -->
  <rect x="30" y="500" width="800" height="46" rx="8" fill="#F8F7FF" stroke="#AFA9EC" stroke-width="1"/>
  <text x="430" y="520" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Key insight: W is used in the forward pass (its knowledge shapes the gradient signal) — but is never modified.</text>
  <text x="430" y="538" text-anchor="middle" font-size="11" fill="#534AB7">A and B learn to produce the right correction because the error signal flows through W's rich representations.</text>
</svg>
