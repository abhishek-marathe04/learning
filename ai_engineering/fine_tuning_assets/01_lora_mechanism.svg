<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 480" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">LoRA: Low-Rank Adaptation Mechanism</text>

  <!-- SECTION LABELS -->
  <text x="200" y="60" text-anchor="middle" font-size="12" fill="#888">Full Fine-Tuning</text>
  <text x="620" y="60" text-anchor="middle" font-size="12" fill="#888">LoRA</text>

  <!-- DIVIDER -->
  <line x1="430" y1="50" x2="430" y2="430" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ===== LEFT: Full Fine-Tuning ===== -->
  <!-- W frozen -->
  <rect x="80" y="80" width="100" height="130" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="130" y="138" text-anchor="middle" font-size="15" font-weight="600" fill="#444">W</text>
  <text x="130" y="158" text-anchor="middle" font-size="11" fill="#888">frozen</text>

  <!-- + -->
  <text x="200" y="152" text-anchor="middle" font-size="20" fill="#888">+</text>

  <!-- ΔW being updated -->
  <rect x="215" y="80" width="100" height="130" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="265" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#633806">ΔW</text>
  <text x="265" y="150" text-anchor="middle" font-size="11" fill="#854F0B">d × d params</text>
  <text x="265" y="167" text-anchor="middle" font-size="11" fill="#854F0B">all updated</text>

  <!-- dim label -->
  <text x="200" y="230" text-anchor="middle" font-size="11" fill="#888">e.g. 4096 × 4096</text>
  <text x="200" y="246" text-anchor="middle" font-size="11" fill="#888">= 16.7 M params updated</text>

  <!-- cost badge -->
  <rect x="90" y="264" width="230" height="32" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
  <text x="205" y="284" text-anchor="middle" font-size="12" font-weight="600" fill="#A32D2D">Expensive · risks forgetting</text>

  <!-- ===== RIGHT: LoRA ===== -->
  <!-- W frozen (gray) -->
  <rect x="460" y="80" width="100" height="130" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="510" y="138" text-anchor="middle" font-size="15" font-weight="600" fill="#444">W</text>
  <text x="510" y="158" text-anchor="middle" font-size="11" fill="#888">frozen</text>

  <!-- + -->
  <text x="575" y="152" text-anchor="middle" font-size="20" fill="#888">+</text>

  <!-- A matrix (tall thin) -->
  <rect x="590" y="100" width="44" height="110" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="612" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">A</text>
  <text x="612" y="168" text-anchor="middle" font-size="10" fill="#0F6E56">d × r</text>

  <!-- × -->
  <text x="644" y="155" text-anchor="middle" font-size="14" fill="#888">×</text>

  <!-- B matrix (wide thin) -->
  <rect x="655" y="128" width="120" height="54" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="715" y="153" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">B</text>
  <text x="715" y="168" text-anchor="middle" font-size="10" fill="#0F6E56">r × d</text>

  <!-- dim label -->
  <text x="630" y="230" text-anchor="middle" font-size="11" fill="#888">r=8: only 65 K params trained</text>
  <text x="630" y="246" text-anchor="middle" font-size="11" fill="#888">vs 16.7 M for full fine-tune</text>

  <!-- saving badge -->
  <rect x="460" y="264" width="330" height="32" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="625" y="284" text-anchor="middle" font-size="12" font-weight="600" fill="#27500A">~250× fewer trainable params · no forgetting</text>

  <!-- ===== BOTTOM: Inference equation ===== -->
  <line x1="40" y1="320" x2="820" y2="320" stroke="#e0e0e0" stroke-width="1"/>
  <text x="430" y="348" text-anchor="middle" font-size="13" fill="#888">How it looks at inference</text>

  <!-- x input -->
  <rect x="60" y="362" width="60" height="44" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="90" y="389" text-anchor="middle" font-size="15" font-weight="600" fill="#444">x</text>

  <!-- W·x -->
  <line x1="120" y1="375" x2="180" y2="365" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="180" y="352" width="100" height="44" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="230" y="372" text-anchor="middle" font-size="13" font-weight="600" fill="#444">W · x</text>
  <text x="230" y="388" text-anchor="middle" font-size="10" fill="#888">frozen path</text>

  <!-- B·A·x -->
  <line x1="120" y1="389" x2="180" y2="420" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow-teal)"/>
  <rect x="180" y="408" width="120" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="240" y="428" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">B · A · x</text>
  <text x="240" y="444" text-anchor="middle" font-size="10" fill="#0F6E56">adapter path</text>

  <!-- + -->
  <line x1="300" y1="374" x2="346" y2="374" stroke="#888" stroke-width="1"/>
  <line x1="300" y1="430" x2="346" y2="400" stroke="#888" stroke-width="1"/>
  <text x="352" y="390" text-anchor="middle" font-size="18" fill="#888">+</text>

  <!-- arrow to output -->
  <line x1="370" y1="390" x2="420" y2="390" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- output -->
  <rect x="420" y="362" width="360" height="54" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="600" y="385" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">output = W·x + B·A·x</text>
  <text x="600" y="403" text-anchor="middle" font-size="11" fill="#3C3489">mathematically identical to (W + ΔW)·x</text>

  <!-- rank note -->
  <text x="430" y="468" text-anchor="middle" font-size="11" fill="#aaa">r (rank) is typically 4, 8, or 16 — a hyperparameter you choose. Lower r = fewer params, less expressivity.</text>
</svg>
