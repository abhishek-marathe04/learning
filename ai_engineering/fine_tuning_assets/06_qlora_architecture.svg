<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 500" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">QLoRA: Full Architecture During Training</text>
  <text x="430" y="46" text-anchor="middle" font-size="12" fill="#888">= Quantized base model (nf4) + LoRA adapters (bfloat16) + double quantization</text>

  <!-- ===== LEFT: GPU VRAM breakdown ===== -->
  <text x="190" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#555">GPU VRAM usage comparison</text>

  <!-- Full fine-tune bar -->
  <text x="56" y="98" font-size="11" fill="#888">Full FT</text>
  <rect x="130" y="86" width="320" height="30" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="290" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">~80 GB  (weights + grads + optimizer states)</text>

  <!-- LoRA bar -->
  <text x="56" y="138" font-size="11" fill="#888">LoRA</text>
  <rect x="130" y="126" width="200" height="30" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="230" y="146" text-anchor="middle" font-size="11" font-weight="600" fill="#633806">~30 GB  (float16 W + A,B grads)</text>

  <!-- QLoRA bar -->
  <text x="56" y="178" font-size="11" fill="#888">QLoRA</text>
  <rect x="130" y="166" width="74" height="30" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="167" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C">~6 GB</text>
  <text x="280" y="186" font-size="11" fill="#1D9E75">← fits on a single consumer GPU!</text>

  <!-- ===== RIGHT: Architecture diagram ===== -->
  <text x="640" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#555">What's in memory during QLoRA training</text>

  <!-- Outer container: GPU VRAM -->
  <rect x="450" y="84" width="390" height="340" rx="14" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="538" y="102" font-size="11" fill="#aaa">GPU VRAM</text>

  <!-- W in nf4 (big, purple) -->
  <rect x="466" y="110" width="174" height="130" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="553" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#26215C">W (nf4)</text>
  <text x="553" y="160" text-anchor="middle" font-size="11" fill="#534AB7">4-bit frozen weights</text>
  <text x="553" y="178" text-anchor="middle" font-size="11" fill="#534AB7">~3.5 GB for 7B model</text>
  <text x="553" y="198" text-anchor="middle" font-size="11" fill="#7F77DD">never updated</text>
  <text x="553" y="216" text-anchor="middle" font-size="10" fill="#888">dequant to bf16 on-the-fly</text>
  <text x="553" y="232" text-anchor="middle" font-size="10" fill="#888">during forward pass only</text>

  <!-- A in bf16 (small, teal) -->
  <rect x="656" y="110" width="170" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="741" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">A  (bf16)</text>
  <text x="741" y="154" text-anchor="middle" font-size="10" fill="#0F6E56">trainable · d×r · tiny</text>

  <!-- B in bf16 (small, teal) -->
  <rect x="656" y="180" width="170" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="741" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">B  (bf16)</text>
  <text x="741" y="224" text-anchor="middle" font-size="10" fill="#0F6E56">trainable · r×d · tiny</text>

  <!-- Optimizer states (only for A, B) -->
  <rect x="466" y="254" width="360" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="646" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#444">optimizer states (AdamW)</text>
  <text x="646" y="296" text-anchor="middle" font-size="10" fill="#888">only for A and B — not for W (frozen)  →  very small</text>

  <!-- Gradient buffer -->
  <rect x="466" y="326" width="360" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="646" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">gradient buffer</text>
  <text x="646" y="366" text-anchor="middle" font-size="10" fill="#854F0B">∂L/∂A and ∂L/∂B only  |  temporary  |  cleared after each step</text>

  <!-- Double quant note -->
  <rect x="466" y="388" width="360" height="28" rx="6" fill="#F8F7FF" stroke="#AFA9EC" stroke-width="1"/>
  <text x="646" y="406" text-anchor="middle" font-size="10" fill="#534AB7">double quantization: even the scale factors are quantized (saves ~0.5 GB more)</text>

  <!-- ===== BOTTOM: Training flow ===== -->
  <line x1="30" y1="442" x2="830" y2="442" stroke="#e0e0e0" stroke-width="1"/>
  <text x="430" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#555">Forward pass flow in QLoRA</text>

  <rect x="30" y="472" width="60" height="22" rx="4" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
  <text x="60" y="487" text-anchor="middle" font-size="11" fill="#444">x</text>

  <line x1="90" y1="483" x2="118" y2="483" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="118" y="472" width="130" height="22" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="183" y="487" text-anchor="middle" font-size="10" fill="#26215C">dequant W nf4→bf16</text>

  <line x1="248" y1="483" x2="276" y2="483" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr-purple)"/>

  <rect x="276" y="472" width="100" height="22" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="326" y="487" text-anchor="middle" font-size="10" fill="#26215C">W_bf16 · x</text>

  <line x1="376" y1="483" x2="404" y2="483" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="404" y="472" width="60" height="22" rx="4" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
  <text x="434" y="487" text-anchor="middle" font-size="13" fill="#444">+</text>

  <line x1="464" y1="483" x2="492" y2="483" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="492" y="472" width="110" height="22" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="547" y="487" text-anchor="middle" font-size="10" fill="#085041">B_bf16 · A_bf16 · x</text>

  <line x1="602" y1="483" x2="630" y2="483" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="630" y="472" width="200" height="22" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="730" y="487" text-anchor="middle" font-size="10" fill="#26215C">output (discard dequant W — save VRAM)</text>
</svg>
