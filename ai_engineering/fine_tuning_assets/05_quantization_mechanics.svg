<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 520" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">How Quantization Works: The Full Cycle</text>

  <!-- ==================== STEP 1: Quantize ==================== -->
  <text x="430" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#185FA5">Step 1 — Quantize: map float values to integer buckets</text>

  <!-- Number line -->
  <line x1="40" y1="90" x2="820" y2="90" stroke="#ccc" stroke-width="1.5"/>
  <line x1="40" y1="80" x2="40" y2="100" stroke="#888" stroke-width="1.5"/>
  <line x1="820" y1="80" x2="820" y2="100" stroke="#888" stroke-width="1.5"/>
  <text x="40" y="116" text-anchor="middle" font-size="11" fill="#888">-1.8 (min)</text>
  <text x="820" y="116" text-anchor="middle" font-size="11" fill="#888">+2.4 (max)</text>
  <text x="430" y="70" text-anchor="middle" font-size="11" fill="#888">range = 4.2  |  for int8: scale = 4.2 / 255 = 0.01647 per bucket</text>

  <!-- bucket ticks -->
  <line x1="93" y1="84" x2="93" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="146" y1="84" x2="146" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="199" y1="84" x2="199" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="252" y1="84" x2="252" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="305" y1="84" x2="305" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="358" y1="84" x2="358" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="411" y1="84" x2="411" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="464" y1="84" x2="464" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="517" y1="84" x2="517" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="570" y1="84" x2="570" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="623" y1="84" x2="623" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="676" y1="84" x2="676" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="729" y1="84" x2="729" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <line x1="782" y1="84" x2="782" y2="96" stroke="#B5D4F4" stroke-width="0.8"/>
  <text x="430" y="130" text-anchor="middle" font-size="10" fill="#378ADD">256 equal-width buckets (int8), each 0.01647 wide</text>

  <!-- 3 example values -->
  <!-- -0.9 at (-0.9+1.8)/4.2*780+40 = 207px -->
  <circle cx="207" cy="90" r="6" fill="#D85A30"/>
  <line x1="207" y1="96" x2="207" y2="160" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="207" y="154" text-anchor="middle" font-size="11" font-weight="600" fill="#993C1D">-0.9</text>
  <rect x="160" y="162" width="94" height="32" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="207" y="182" text-anchor="middle" font-size="10" fill="#993C1D">→ bucket 54</text>

  <!-- 0.314 at (0.314+1.8)/4.2*780+40 = 433px -->
  <circle cx="433" cy="90" r="6" fill="#7F77DD"/>
  <line x1="433" y1="96" x2="433" y2="160" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="433" y="154" text-anchor="middle" font-size="11" font-weight="600" fill="#534AB7">0.314</text>
  <rect x="386" y="162" width="94" height="32" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="433" y="182" text-anchor="middle" font-size="10" fill="#534AB7">→ bucket 128</text>

  <!-- 1.7 at (1.7+1.8)/4.2*780+40 = 690px -->
  <circle cx="690" cy="90" r="6" fill="#1D9E75"/>
  <line x1="690" y1="96" x2="690" y2="160" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="690" y="154" text-anchor="middle" font-size="11" font-weight="600" fill="#0F6E56">1.7</text>
  <rect x="643" y="162" width="94" height="32" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="690" y="182" text-anchor="middle" font-size="10" fill="#0F6E56">→ bucket 216</text>

  <!-- formula -->
  <rect x="40" y="206" width="780" height="52" rx="8" fill="#F7FAFE" stroke="#B5D4F4" stroke-width="1"/>
  <text x="430" y="226" text-anchor="middle" font-size="12" font-weight="600" fill="#185FA5">quantized_value = round( (original - min) / scale )</text>
  <text x="430" y="246" text-anchor="middle" font-size="11" fill="#378ADD">e.g.  round( (0.314 - (-1.8)) / 0.01647 )  =  round(128.4)  =  128</text>

  <!-- ==================== STEP 2: Store ==================== -->
  <line x1="40" y1="276" x2="820" y2="276" stroke="#f0f0f0" stroke-width="1"/>
  <text x="430" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#0F6E56">Step 2 — Store: integers + tiny metadata (this is the key to reversibility)</text>

  <!-- float32 block -->
  <rect x="40" y="308" width="260" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="170" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#0C447C">original float32 values</text>
  <text x="170" y="348" text-anchor="middle" font-size="11" fill="#185FA5">0.314, -0.9, 1.7, 0.003 ...</text>
  <text x="170" y="366" text-anchor="middle" font-size="10" fill="#888">4 bytes each → 4000 bytes / 1000 values</text>
  <text x="170" y="382" text-anchor="middle" font-size="10" fill="#888">GPU VRAM consumed: large</text>

  <text x="320" y="356" text-anchor="middle" font-size="18" fill="#888">→</text>

  <!-- int8 block -->
  <rect x="340" y="308" width="200" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="440" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">int8 integers</text>
  <text x="440" y="348" text-anchor="middle" font-size="11" fill="#0F6E56">128, 54, 216, 110 ...</text>
  <text x="440" y="366" text-anchor="middle" font-size="10" fill="#888">1 byte each → 1000 bytes</text>
  <text x="440" y="382" text-anchor="middle" font-size="10" fill="#888">75% smaller</text>

  <!-- + metadata -->
  <text x="560" y="356" text-anchor="middle" font-size="14" fill="#888">+</text>

  <!-- metadata block -->
  <rect x="580" y="308" width="240" height="80" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="700" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">metadata (per block)</text>
  <text x="700" y="348" text-anchor="middle" font-size="11" fill="#854F0B">scale = 0.01647  (float32)</text>
  <text x="700" y="366" text-anchor="middle" font-size="11" fill="#854F0B">zero_point = -1.8  (float32)</text>
  <text x="700" y="382" text-anchor="middle" font-size="10" fill="#888">tiny overhead — 8 bytes per 64-value block</text>

  <!-- ==================== STEP 3: Dequantize ==================== -->
  <line x1="40" y1="404" x2="820" y2="404" stroke="#f0f0f0" stroke-width="1"/>
  <text x="430" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#BA7517">Step 3 — Dequantize: reconstruct approximate original (on-the-fly during forward pass)</text>

  <!-- int8 value -->
  <rect x="40" y="438" width="130" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="105" y="459" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">stored: 128</text>
  <text x="105" y="477" text-anchor="middle" font-size="10" fill="#0F6E56">integer bucket</text>

  <text x="190" y="468" text-anchor="middle" font-size="13" fill="#888">×</text>

  <!-- scale -->
  <rect x="210" y="438" width="160" height="52" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="290" y="459" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">scale (0.01647)</text>
  <text x="290" y="477" text-anchor="middle" font-size="10" fill="#854F0B">stored metadata</text>

  <text x="390" y="468" text-anchor="middle" font-size="13" fill="#888">+</text>

  <!-- zero point -->
  <rect x="410" y="438" width="170" height="52" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="495" y="459" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">zero_point (-1.8)</text>
  <text x="495" y="477" text-anchor="middle" font-size="10" fill="#854F0B">stored metadata</text>

  <text x="600" y="468" text-anchor="middle" font-size="13" fill="#888">=</text>

  <!-- result -->
  <rect x="620" y="438" width="220" height="52" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="730" y="457" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">≈ 0.3141  (was 0.3142)</text>
  <text x="730" y="475" text-anchor="middle" font-size="10" fill="#534AB7">error: 0.0001 — negligible</text>

  <!-- footer -->
  <rect x="40" y="502" width="780" height="12" rx="4" fill="#F8F7FF"/>
  <text x="430" y="512" text-anchor="middle" font-size="10" fill="#7F77DD">In QLoRA: W is dequantized to bfloat16 only during the forward pass matrix multiply — never stored back as float. VRAM stays low.</text>
</svg>
