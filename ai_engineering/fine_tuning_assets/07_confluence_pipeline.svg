<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 580" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#1a1a1a">Confluence Fine-Tuning Pipeline (Initial + Daily Incremental)</text>

  <!-- ========= PHASE 1: DATA PREP ========= -->
  <rect x="18" y="36" width="6" height="110" rx="3" fill="#1D9E75"/>
  <text x="34" y="50" font-size="11" font-weight="600" fill="#0F6E56">Phase 1 — Data Preparation</text>

  <rect x="34" y="56" width="140" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="104" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Confluence dump</text>
  <text x="104" y="98" text-anchor="middle" font-size="10" fill="#0F6E56">XML space export</text>
  <text x="104" y="114" text-anchor="middle" font-size="10" fill="#0F6E56">all pages, spaces</text>
  <text x="104" y="130" text-anchor="middle" font-size="10" fill="#0F6E56">attachments metadata</text>

  <line x1="174" y1="96" x2="214" y2="96" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="214" y="56" width="150" height="80" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="289" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#444">Parse + clean</text>
  <text x="289" y="98" text-anchor="middle" font-size="10" fill="#888">strip HTML tags</text>
  <text x="289" y="114" text-anchor="middle" font-size="10" fill="#888">remove nav/macros</text>
  <text x="289" y="130" text-anchor="middle" font-size="10" fill="#888">PII scrubbing</text>

  <line x1="364" y1="96" x2="404" y2="96" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="404" y="56" width="170" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="489" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">Format training pairs</text>
  <text x="489" y="96" text-anchor="middle" font-size="10" fill="#534AB7">instruction-completion</text>
  <text x="489" y="112" text-anchor="middle" font-size="10" fill="#534AB7">or document-completion</text>
  <text x="489" y="128" text-anchor="middle" font-size="10" fill="#534AB7">JSONL format</text>

  <line x1="574" y1="96" x2="614" y2="96" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="614" y="56" width="150" height="80" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="689" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#444">Train / val split</text>
  <text x="689" y="96" text-anchor="middle" font-size="10" fill="#888">90% train</text>
  <text x="689" y="112" text-anchor="middle" font-size="10" fill="#888">10% validation</text>
  <text x="689" y="128" text-anchor="middle" font-size="10" fill="#888">shuffle + seed</text>

  <!-- ========= PHASE 2: FINE-TUNING ========= -->
  <line x1="18" y1="158" x2="842" y2="158" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="18" y="166" width="6" height="130" rx="3" fill="#7F77DD"/>
  <text x="34" y="180" font-size="11" font-weight="600" fill="#534AB7">Phase 2 — QLoRA Fine-Tuning</text>

  <rect x="34" y="190" width="140" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="104" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">Base model</text>
  <text x="104" y="230" text-anchor="middle" font-size="10" fill="#534AB7">Llama 3.1 8B</text>
  <text x="104" y="246" text-anchor="middle" font-size="10" fill="#534AB7">or Mistral 7B</text>
  <text x="104" y="262" text-anchor="middle" font-size="10" fill="#534AB7">load in nf4</text>

  <line x1="174" y1="235" x2="214" y2="235" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="214" y="190" width="160" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="294" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">Attach LoRA adapters</text>
  <text x="294" y="230" text-anchor="middle" font-size="10" fill="#534AB7">inject A,B into</text>
  <text x="294" y="246" text-anchor="middle" font-size="10" fill="#534AB7">attention layers</text>
  <text x="294" y="262" text-anchor="middle" font-size="10" fill="#534AB7">rank r=8 or 16</text>

  <line x1="374" y1="235" x2="414" y2="235" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="414" y="190" width="160" height="90" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="494" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">Training run</text>
  <text x="494" y="230" text-anchor="middle" font-size="10" fill="#854F0B">SFTTrainer (trl)</text>
  <text x="494" y="246" text-anchor="middle" font-size="10" fill="#854F0B">2-3 epochs</text>
  <text x="494" y="262" text-anchor="middle" font-size="10" fill="#854F0B">lr ≈ 2e-4</text>

  <line x1="574" y1="235" x2="614" y2="235" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="614" y="190" width="150" height="90" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="689" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#27500A">Eval + merge</text>
  <text x="689" y="230" text-anchor="middle" font-size="10" fill="#3B6D11">perplexity check</text>
  <text x="689" y="246" text-anchor="middle" font-size="10" fill="#3B6D11">golden Q&amp;A evals</text>
  <text x="689" y="262" text-anchor="middle" font-size="10" fill="#3B6D11">merge A,B into W</text>

  <!-- ========= PHASE 3: DEPLOYMENT ========= -->
  <line x1="18" y1="298" x2="842" y2="298" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="18" y="306" width="6" height="100" rx="3" fill="#1D9E75"/>
  <text x="34" y="320" font-size="11" font-weight="600" fill="#0F6E56">Phase 3 — Deployment</text>

  <rect x="34" y="330" width="185" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="126" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Serve merged model</text>
  <text x="126" y="370" text-anchor="middle" font-size="10" fill="#0F6E56">vLLM / TGI on org GPU</text>
  <text x="126" y="386" text-anchor="middle" font-size="10" fill="#0F6E56">FastAPI wrapper</text>

  <line x1="219" y1="362" x2="259" y2="362" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="259" y="330" width="185" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="351" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">Optional RAG layer</text>
  <text x="351" y="370" text-anchor="middle" font-size="10" fill="#534AB7">embed new pages</text>
  <text x="351" y="386" text-anchor="middle" font-size="10" fill="#534AB7">retrieve at query time</text>

  <line x1="444" y1="362" x2="484" y2="362" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="484" y="330" width="185" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="576" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#0C447C">Internal users / API</text>
  <text x="576" y="370" text-anchor="middle" font-size="10" fill="#185FA5">internal chatbot</text>
  <text x="576" y="386" text-anchor="middle" font-size="10" fill="#185FA5">search assistant</text>

  <!-- ========= PHASE 4: DAILY LOOP ========= -->
  <line x1="18" y1="412" x2="842" y2="412" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="18" y="420" width="6" height="148" rx="3" fill="#EF9F27"/>
  <text x="34" y="434" font-size="11" font-weight="600" fill="#854F0B">Phase 4 — Daily Incremental Fine-Tuning Loop</text>

  <rect x="34" y="446" width="128" height="80" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="98" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">Cron trigger</text>
  <text x="98" y="486" text-anchor="middle" font-size="10" fill="#854F0B">daily 2am</text>
  <text x="98" y="502" text-anchor="middle" font-size="10" fill="#854F0B">delta pull</text>
  <text x="98" y="518" text-anchor="middle" font-size="10" fill="#854F0B">Airflow / cron</text>

  <line x1="162" y1="486" x2="202" y2="486" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="202" y="446" width="140" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="272" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Fetch delta</text>
  <text x="272" y="486" text-anchor="middle" font-size="10" fill="#0F6E56">Confluence REST API</text>
  <text x="272" y="502" text-anchor="middle" font-size="10" fill="#0F6E56">lastModified filter</text>
  <text x="272" y="518" text-anchor="middle" font-size="10" fill="#0F6E56">new + updated pages</text>

  <line x1="342" y1="486" x2="382" y2="486" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="382" y="446" width="140" height="80" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="452" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="#444">Clean + format</text>
  <text x="452" y="486" text-anchor="middle" font-size="10" fill="#888">same pipeline</text>
  <text x="452" y="502" text-anchor="middle" font-size="10" fill="#888">as phase 1</text>
  <text x="452" y="518" text-anchor="middle" font-size="10" fill="#888">JSONL output</text>

  <line x1="522" y1="486" x2="562" y2="486" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="562" y="446" width="130" height="80" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="627" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">LoRA run</text>
  <text x="627" y="486" text-anchor="middle" font-size="10" fill="#854F0B">new adapter</text>
  <text x="627" y="502" text-anchor="middle" font-size="10" fill="#854F0B">on delta only</text>
  <text x="627" y="518" text-anchor="middle" font-size="10" fill="#854F0B">15-30 mins</text>

  <line x1="692" y1="486" x2="726" y2="486" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="726" y="446" width="116" height="80" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="784" y="464" text-anchor="middle" font-size="11" font-weight="600" fill="#27500A">Eval gate</text>
  <text x="784" y="480" text-anchor="middle" font-size="10" fill="#3B6D11">pass? → promote</text>
  <text x="784" y="496" text-anchor="middle" font-size="10" fill="#3B6D11">fail? → alert</text>
  <text x="784" y="512" text-anchor="middle" font-size="10" fill="#3B6D11">+ rollback</text>

  <!-- feedback arrow back -->
  <path d="M784 526 Q784 560 430 560 Q76 560 76 526" fill="none" stroke="#EF9F27" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="430" y="556" text-anchor="middle" font-size="10" fill="#854F0B">↻ repeat tomorrow</text>
</svg>
