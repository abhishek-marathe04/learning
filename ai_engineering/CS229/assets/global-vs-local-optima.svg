<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" role="img">
  <title>Global optima vs local optima — convex vs non-convex loss surface</title>
  <desc>Two side-by-side plots. Left: convex parabola for linear regression with single global minimum marked. Right: non-convex bumpy surface with multiple local minima and one global minimum.</desc>

  <!-- Panel backgrounds -->
  <rect x="20" y="20" width="300" height="270" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <rect x="360" y="20" width="300" height="270" rx="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>

  <!-- Panel titles -->
  <text x="170" y="46" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#27500A">Linear regression (convex)</text>
  <text x="510" y="46" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#791F1F">Neural nets etc. (non-convex)</text>

  <!-- LEFT: Smooth parabola -->
  <!-- Axes -->
  <line x1="50" y1="245" x2="290" y2="245" stroke="#888" stroke-width="0.8"/>
  <line x1="170" y1="60" x2="170" y2="248" stroke="#888" stroke-width="0.8"/>
  <text x="170" y="260" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">θ</text>
  <text x="38" y="100" font-family="sans-serif" font-size="10" fill="#5F5E5A">J(θ)</text>

  <!-- Smooth bowl -->
  <path d="M55,240 C80,235 120,200 145,160 C158,138 165,110 170,75 C175,110 182,138 195,160 C220,200 260,235 285,240" fill="rgba(42,120,214,0.10)" stroke="#2a78d6" stroke-width="2.5" fill-rule="nonzero"/>

  <!-- Global min star -->
  <circle cx="170" cy="75" r="7" fill="#1baf7a" stroke="#fff" stroke-width="2"/>
  <line x1="177" y1="70" x2="215" y2="55" stroke="#1baf7a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="218" y="54" font-family="sans-serif" font-size="10" fill="#27500A">global minimum</text>
  <text x="218" y="66" font-family="sans-serif" font-size="10" fill="#27500A">(only one!)</text>

  <!-- Arrow showing ball rolling down -->
  <path d="M80,210 Q100,195 130,170 Q150,155 160,130" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr2)"/>
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="55" y="222" font-family="sans-serif" font-size="10" fill="#888">start anywhere →</text>
  <text x="55" y="234" font-family="sans-serif" font-size="10" fill="#888">always reaches bottom</text>

  <!-- RIGHT: Bumpy non-convex -->
  <line x1="390" y1="245" x2="630" y2="245" stroke="#888" stroke-width="0.8"/>
  <line x1="510" y1="60" x2="510" y2="248" stroke="#888" stroke-width="0.8"/>
  <text x="510" y="260" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">θ</text>

  <!-- Bumpy curve -->
  <path d="M395,230 C405,225 415,200 425,185 C435,170 440,190 450,195 C460,200 465,175 475,155 C485,135 490,155 500,165 C505,170 508,145 510,115 C512,145 515,160 520,155 C530,145 535,165 545,175 C555,185 560,200 570,195 C580,190 585,170 595,155 C605,140 615,185 625,230" fill="rgba(226,75,74,0.10)" stroke="#E24B4A" stroke-width="2.5"/>

  <!-- Local minima (red dots) -->
  <circle cx="450" cy="195" r="6" fill="#E24B4A" stroke="#fff" stroke-width="1.5"/>
  <circle cx="570" cy="195" r="6" fill="#E24B4A" stroke="#fff" stroke-width="1.5"/>
  <circle cx="623" cy="228" r="6" fill="#E24B4A" stroke="#fff" stroke-width="1.5"/>

  <!-- Global minimum (green star) -->
  <circle cx="510" cy="115" r="7" fill="#1baf7a" stroke="#fff" stroke-width="2"/>

  <!-- Labels -->
  <text x="430" y="216" font-family="sans-serif" font-size="9" fill="#A32D2D">local</text>
  <text x="550" y="216" font-family="sans-serif" font-size="9" fill="#A32D2D">local</text>
  <line x1="517" y1="110" x2="548" y2="90" stroke="#1baf7a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="550" y="88" font-family="sans-serif" font-size="9" fill="#27500A">global</text>

  <!-- Legend -->
  <circle cx="400" cy="278" r="5" fill="#E24B4A"/>
  <text x="410" y="282" font-family="sans-serif" font-size="10" fill="#5F5E5A">local minimum (GD may get stuck here)</text>
  <circle cx="400" cy="296" r="5" fill="#1baf7a"/>
  <text x="410" y="300" font-family="sans-serif" font-size="10" fill="#5F5E5A">global minimum (true best answer)</text>
</svg>
