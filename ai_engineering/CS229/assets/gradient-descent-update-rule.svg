<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" role="img">
  <title>Gradient descent update rule decoded</title>
  <desc>The formula theta_j := theta_j - alpha * partial J / partial theta_j, with each symbol annotated and explained below.</desc>

  <!-- Formula box -->
  <rect x="40" y="24" width="600" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="340" y="63" text-anchor="middle" font-family="monospace" font-size="22" font-weight="500" fill="#0C447C">θⱼ  :=  θⱼ  −  α  ·  ∂J(θ)/∂θⱼ</text>

  <!-- Annotation lines dropping down from formula -->
  <!-- θⱼ := (new value) -->
  <line x1="90" y1="88" x2="90" y2="130" stroke="#185FA5" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="30" y="130" width="140" height="52" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="100" y="151" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#0C447C">θⱼ := (left side)</text>
  <text x="100" y="166" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#185FA5">New value of weight j</text>
  <text x="100" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#185FA5">Replace with new value</text>

  <!-- θⱼ (right side, current) -->
  <line x1="230" y1="88" x2="230" y2="130" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="165" y="130" width="140" height="52" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="235" y="151" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#2C2C2A">θⱼ (right side)</text>
  <text x="235" y="166" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">Current value of weight</text>
  <text x="235" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">Start from where you are</text>

  <!-- alpha -->
  <line x1="370" y1="88" x2="370" y2="130" stroke="#854F0B" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="305" y="130" width="140" height="52" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="375" y="151" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#633806">α (learning rate)</text>
  <text x="375" y="166" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#854F0B">How big a step to take</text>
  <text x="375" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#854F0B">Too large → overshoot</text>

  <!-- partial J / partial theta_j -->
  <line x1="560" y1="88" x2="560" y2="130" stroke="#A32D2D" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="495" y="130" width="150" height="52" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="570" y="151" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#791F1F">∂J/∂θⱼ (slope)</text>
  <text x="570" y="166" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A32D2D">Which way is uphill</text>
  <text x="570" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A32D2D">and how steep</text>

  <!-- Minus sign explanation -->
  <rect x="40" y="210" width="600" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="233" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#085041">The − sign is the genius of gradient descent</text>
  <text x="340" y="253" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Derivative = which way is uphill.  Subtract it = walk downhill.  One character, entire algorithm.</text>

  <!-- Expanded result -->
  <rect x="40" y="292" width="600" height="64" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">After deriving ∂J/∂θⱼ = (h(x)−y)·xⱼ, the update becomes:</text>
  <text x="340" y="344" text-anchor="middle" font-family="monospace" font-size="16" font-weight="500" fill="#2C2C2A">θⱼ  :=  θⱼ  −  α · (h(x) − y) · xⱼ</text>
</svg>
