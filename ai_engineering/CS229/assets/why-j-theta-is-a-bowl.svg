<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" role="img">
  <title>Why J(theta) is a quadratic bowl — algebraic explanation</title>
  <desc>Shows how squaring a linear expression in theta always produces a quadratic (parabola), and how summing multiple quadratics over training examples still gives a quadratic. Includes the 1D to 3D progression from parabola to paraboloid.</desc>

  <defs>
    <marker id="arq" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Why J(θ) is always a bowl (quadratic)</text>

  <!-- Step 1: linear thing squared -->
  <rect x="40" y="48" width="600" height="72" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="70" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#185FA5">Step 1 — h(x) is LINEAR in θ (just θ × x, a straight line as θ varies)</text>
  <text x="340" y="92" text-anchor="middle" font-family="monospace" font-size="14" fill="#0C447C">( h(x) − y )  =  ( θ·x − y )  ← linear in θ</text>
  <text x="340" y="110" text-anchor="middle" font-family="monospace" font-size="14" fill="#0C447C">( θ·x − y )²  =  squaring a linear thing  →  quadratic</text>

  <line x1="340" y1="120" x2="340" y2="146" stroke="#888" stroke-width="1" marker-end="url(#arq)"/>
  <text x="440" y="138" font-family="sans-serif" font-size="10" fill="#888">expand with x=1, y=3: (θ−3)² = θ²−6θ+9</text>

  <!-- Step 2: quadratic expansion -->
  <rect x="40" y="150" width="600" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="172" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#854F0B">Step 2 — Expanding confirms: highest power of θ is 2</text>
  <text x="340" y="196" text-anchor="middle" font-family="monospace" font-size="15" font-weight="500" fill="#633806">(θ−3)²  =  θ²  −  6θ  +  9  ← form: aθ² + bθ + c</text>

  <line x1="340" y1="210" x2="340" y2="236" stroke="#888" stroke-width="1" marker-end="url(#arq)"/>
  <text x="440" y="228" font-family="sans-serif" font-size="10" fill="#888">a=1 &gt; 0 → opens upward → bowl</text>

  <!-- Step 3: sum of quadratics -->
  <rect x="40" y="240" width="600" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="262" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#085041">Step 3 — Multiple training examples: sum of quadratics = still quadratic</text>
  <text x="340" y="286" text-anchor="middle" font-family="monospace" font-size="13" fill="#085041">J = ½[(θ−y₁)² + (θ−y₂)² + ...] → still aθ² + bθ + c form</text>

  <!-- 1D → 2D → nD progression -->
  <rect x="40" y="318" width="186" height="68" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="133" y="338" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#2C2C2A">1 weight θ</text>
  <text x="133" y="358" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#2a78d6">∪</text>
  <text x="133" y="378" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">Parabola (2D curve)</text>

  <rect x="247" y="318" width="186" height="68" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="340" y="338" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#0C447C">2 weights θ₀, θ₁</text>
  <text x="340" y="358" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#2a78d6">⌣</text>
  <text x="340" y="378" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#185FA5">Paraboloid (3D bowl)</text>

  <rect x="454" y="318" width="186" height="68" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="547" y="338" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#2C2C2A">n weights</text>
  <text x="547" y="358" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#2a78d6">✦</text>
  <text x="547" y="378" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">n-dim paraboloid</text>

  <!-- Key guarantee box -->
  <line x1="340" y1="300" x2="340" y2="316" stroke="#888" stroke-width="1" marker-end="url(#arq)"/>
</svg>
