<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" role="img">
  <title>Contour plot with gradient descent path</title>
  <desc>Left panel shows a contour map — elliptical rings around a central minimum, like altitude lines on a topo map. Right panel shows the same contours with gradient descent steps spiraling inward toward the minimum.</desc>

  <defs>
    <marker id="arrc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- LEFT PANEL: What is a contour -->
  <rect x="20" y="20" width="300" height="310" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="170" y="44" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#2C2C2A">What is a contour?</text>
  <text x="170" y="58" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">Bird's-eye view of the 3D bowl</text>

  <!-- Elliptical contours (left) -->
  <ellipse cx="170" cy="175" rx="115" ry="55" fill="none" stroke="#4a3aa7" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="170" cy="175" rx="88" ry="42" fill="none" stroke="#2a78d6" stroke-width="1.5" opacity="0.55"/>
  <ellipse cx="170" cy="175" rx="62" ry="30" fill="none" stroke="#1baf7a" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="170" cy="175" rx="36" ry="17" fill="none" stroke="#eda100" stroke-width="1.5" opacity="0.85"/>
  <ellipse cx="170" cy="175" rx="14" ry="7" fill="none" stroke="#e34948" stroke-width="2" opacity="1"/>

  <!-- Center star -->
  <circle cx="170" cy="175" r="6" fill="#1baf7a" stroke="#fff" stroke-width="2"/>

  <!-- Labels pointing to rings -->
  <line x1="285" y1="175" x2="260" y2="175" stroke="#4a3aa7" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="290" y="179" font-family="sans-serif" font-size="10" fill="#4a3aa7">J = high</text>
  <line x1="258" y1="165" x2="243" y2="162" stroke="#2a78d6" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="232" y1="170" x2="260" y2="185" stroke="#1baf7a" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="206" y1="174" x2="220" y2="195" stroke="#eda100" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="175" y="210" font-family="sans-serif" font-size="10" fill="#e34948">J = lowest</text>

  <!-- Topo map analogy -->
  <rect x="30" y="254" width="280" height="64" rx="6" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="170" y="272" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#0C447C">Like a topo / hiking map</text>
  <text x="170" y="288" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#185FA5">Each ring = same altitude (same J value)</text>
  <text x="170" y="303" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#185FA5">Inner rings = lower altitude = lower loss</text>
  <text x="170" y="318" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#185FA5">Center star = sea level = global minimum</text>

  <!-- RIGHT PANEL: GD on contours -->
  <rect x="360" y="20" width="300" height="310" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="510" y="44" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#2C2C2A">Gradient descent on contours</text>
  <text x="510" y="58" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">Each step crosses a ring → moving inward</text>

  <!-- Same ellipses (right) - slightly tilted/elongated to show feature scale effect -->
  <ellipse cx="510" cy="175" rx="120" ry="52" fill="none" stroke="#B4B2A9" stroke-width="1" opacity="0.5"/>
  <ellipse cx="510" cy="175" rx="92" ry="40" fill="none" stroke="#B4B2A9" stroke-width="1" opacity="0.5"/>
  <ellipse cx="510" cy="175" rx="65" ry="28" fill="none" stroke="#B4B2A9" stroke-width="1" opacity="0.5"/>
  <ellipse cx="510" cy="175" rx="38" ry="16" fill="none" stroke="#B4B2A9" stroke-width="1" opacity="0.5"/>
  <ellipse cx="510" cy="175" rx="14" ry="6" fill="none" stroke="#B4B2A9" stroke-width="1.5" opacity="0.7"/>

  <!-- GD path: spiral inward -->
  <polyline points="610,138 575,150 548,162 528,170 515,174 510,175" fill="none" stroke="#E24B4A" stroke-width="2" stroke-linejoin="round" marker-end="url(#arrc)"/>

  <!-- Step dots -->
  <circle cx="610" cy="138" r="6" fill="#E24B4A" stroke="#fff" stroke-width="1.5"/>
  <circle cx="575" cy="150" r="5" fill="#E24B4A" stroke="#fff" stroke-width="1.5"/>
  <circle cx="548" cy="162" r="5" fill="#E24B4A" stroke="#fff" stroke-width="1.5"/>
  <circle cx="528" cy="170" r="5" fill="#E24B4A" stroke="#fff" stroke-width="1.5"/>
  <circle cx="515" cy="174" r="5" fill="#E24B4A" stroke="#fff" stroke-width="1.5"/>
  <!-- Center/converged -->
  <circle cx="510" cy="175" r="7" fill="#1baf7a" stroke="#fff" stroke-width="2"/>

  <!-- Step labels -->
  <text x="618" y="136" font-family="sans-serif" font-size="10" fill="#A32D2D">start (high J)</text>
  <text x="583" y="148" font-family="sans-serif" font-size="9" fill="#A32D2D">step 1</text>
  <text x="555" y="160" font-family="sans-serif" font-size="9" fill="#A32D2D">step 2</text>
  <text x="533" y="168" font-family="sans-serif" font-size="9" fill="#A32D2D">step 3</text>

  <!-- Axis labels -->
  <text x="510" y="310" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">θ₁ →</text>
  <text x="375" y="175" font-family="sans-serif" font-size="11" fill="#5F5E5A">θ₀ ↑</text>

  <!-- Insight at bottom -->
  <rect x="370" y="254" width="280" height="64" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="510" y="272" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#085041">Each step ⊥ to the contour ring</text>
  <text x="510" y="288" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F6E56">Perpendicular = steepest downhill direction</text>
  <text x="510" y="303" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F6E56">On 3D bowl = ball rolling down</text>
  <text x="510" y="318" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F6E56">On contour map = path spiraling inward</text>
</svg>
