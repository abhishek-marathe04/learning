<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Real-time collaborative text editor system architecture</title>
  <desc>Architecture showing clients, load balancer, WebSocket servers, pub/sub bus, OT/CRDT engine, presence service, and persistence layer</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Clients -->
  <rect x="40" y="30" width="120" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="100" y="50" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Client A</text>
  <text font-size="12" x="100" y="68" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Browser / Editor</text>

  <rect x="520" y="30" width="120" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="580" y="50" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Client B</text>
  <text font-size="12" x="580" y="68" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Browser / Editor</text>

  <!-- Load Balancer -->
  <rect x="250" y="30" width="180" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="50" text-anchor="middle" dominant-baseline="central" fill="#444441">Load Balancer</text>
  <text font-size="12" x="340" y="68" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Sticky sessions by doc ID</text>

  <!-- Arrows clients to LB -->
  <line x1="160" y1="56" x2="248" y2="56" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="56" x2="432" y2="56" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WebSocket Servers -->
  <rect x="110" y="140" width="170" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="195" y="160" text-anchor="middle" dominant-baseline="central" fill="#3C3489">WS Server 1</text>
  <text font-size="12" x="195" y="178" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Manages connections</text>

  <rect x="400" y="140" width="170" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="485" y="160" text-anchor="middle" dominant-baseline="central" fill="#3C3489">WS Server 2</text>
  <text font-size="12" x="485" y="178" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Manages connections</text>

  <!-- LB to WS Servers -->
  <line x1="300" y1="82" x2="220" y2="138" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="82" x2="460" y2="138" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pub/Sub bus -->
  <rect x="210" y="250" width="260" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="270" text-anchor="middle" dominant-baseline="central" fill="#085041">Pub/Sub Bus</text>
  <text font-size="12" x="340" y="288" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Redis Pub/Sub / Kafka per doc</text>

  <!-- WS Servers to Pub/Sub -->
  <line x1="195" y1="192" x2="260" y2="248" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="485" y1="192" x2="420" y2="248" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OT/CRDT Engine -->
  <rect x="110" y="360" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="210" y="380" text-anchor="middle" dominant-baseline="central" fill="#633806">OT / CRDT Engine</text>
  <text font-size="12" x="210" y="398" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Conflict resolution, ordering</text>

  <!-- Presence Service -->
  <rect x="370" y="360" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="470" y="380" text-anchor="middle" dominant-baseline="central" fill="#712B13">Presence Service</text>
  <text font-size="12" x="470" y="398" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Cursors, active users, TTL</text>

  <!-- Pub/Sub to OT + Presence -->
  <line x1="290" y1="302" x2="240" y2="358" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="302" x2="440" y2="358" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Persistence Layer -->
  <rect x="130" y="482" width="170" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="215" y="502" text-anchor="middle" dominant-baseline="central" fill="#444441">Document Store</text>
  <text font-size="12" x="215" y="520" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Snapshots + op log</text>

  <rect x="380" y="482" width="170" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="465" y="502" text-anchor="middle" dominant-baseline="central" fill="#444441">Cache / Sessions</text>
  <text font-size="12" x="465" y="520" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Redis, auth tokens</text>

  <line x1="210" y1="416" x2="210" y2="480" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="416" x2="465" y2="480" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="572" width="12" height="12" rx="2" fill="#185FA5"/>
  <text font-size="12" x="58" y="582" fill="#5F5E5A">Client</text>
  <rect x="120" y="572" width="12" height="12" rx="2" fill="#534AB7"/>
  <text font-size="12" x="138" y="582" fill="#5F5E5A">Transport</text>
  <rect x="230" y="572" width="12" height="12" rx="2" fill="#0F6E56"/>
  <text font-size="12" x="248" y="582" fill="#5F5E5A">Messaging</text>
  <rect x="348" y="572" width="12" height="12" rx="2" fill="#854F0B"/>
  <text font-size="12" x="366" y="582" fill="#5F5E5A">Conflict resolution</text>
  <rect x="500" y="572" width="12" height="12" rx="2" fill="#5F5E5A"/>
  <text font-size="12" x="518" y="582" fill="#5F5E5A">Persistence</text>
</svg>