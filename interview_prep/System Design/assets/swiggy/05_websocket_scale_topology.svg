<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
<title>WebSocket scale topology for 3M concurrent connections</title>
<desc>Shows load balancer with sticky routing, a pool of WebSocket server instances each holding 10K connections, and their shared subscription to Kafka and Redis for state.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; fill: #444; }
    .box-blue   { fill: #e6f1fb; stroke: #185fa5; }
    .box-gray   { fill: #f1efe8; stroke: #5f5e5a; }
    .box-coral  { fill: #faece7; stroke: #993c1d; }
    .box-amber  { fill: #faeeda; stroke: #854f0b; }
    .box-teal   { fill: #e1f5ee; stroke: #0f6e56; }
  </style>
</defs>

<!-- User rows -->
<rect class="box-blue" x="40"  y="30" width="78" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="79"  y="48" text-anchor="middle" fill="#0c447c">Users</text>
<text class="ts" x="79"  y="64" text-anchor="middle" fill="#185fa5">BLR zone 14</text>

<rect class="box-blue" x="140" y="30" width="78" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="179" y="48" text-anchor="middle" fill="#0c447c">Users</text>
<text class="ts" x="179" y="64" text-anchor="middle" fill="#185fa5">MUM zone 3</text>

<rect class="box-blue" x="240" y="30" width="78" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="279" y="48" text-anchor="middle" fill="#0c447c">Users</text>
<text class="ts" x="279" y="64" text-anchor="middle" fill="#185fa5">DEL zone 8</text>

<rect class="box-blue" x="340" y="30" width="78" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="379" y="48" text-anchor="middle" fill="#0c447c">Users</text>
<text class="ts" x="379" y="64" text-anchor="middle" fill="#185fa5">BLR zone 7</text>

<rect class="box-blue" x="440" y="30" width="78" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="479" y="48" text-anchor="middle" fill="#0c447c">Users</text>
<text class="ts" x="479" y="64" text-anchor="middle" fill="#185fa5">HYD zone 2</text>

<rect class="box-blue" x="540" y="30" width="100" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="590" y="48" text-anchor="middle" fill="#0c447c">Users</text>
<text class="ts" x="590" y="64" text-anchor="middle" fill="#185fa5">3M total</text>

<!-- Users → LB -->
<line x1="79"  y1="74" x2="200" y2="138" stroke="#378ADD" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>
<line x1="179" y1="74" x2="260" y2="138" stroke="#378ADD" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>
<line x1="279" y1="74" x2="310" y2="138" stroke="#378ADD" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>
<line x1="379" y1="74" x2="360" y2="138" stroke="#378ADD" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>
<line x1="479" y1="74" x2="410" y2="138" stroke="#378ADD" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>
<line x1="590" y1="74" x2="470" y2="138" stroke="#378ADD" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>

<!-- Load balancer -->
<rect class="box-gray" x="160" y="140" width="360" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="163" text-anchor="middle" fill="#444441">L4 load balancer</text>
<text class="ts" x="340" y="181" text-anchor="middle">Sticky by zone_id hash — not round-robin</text>

<!-- LB → WS servers -->
<line x1="230" y1="196" x2="110" y2="258" stroke="#888" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<line x1="290" y1="196" x2="230" y2="258" stroke="#888" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<line x1="340" y1="196" x2="340" y2="258" stroke="#888" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<line x1="390" y1="196" x2="450" y2="258" stroke="#888" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<line x1="450" y1="196" x2="570" y2="258" stroke="#888" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- WS instances -->
<rect class="box-coral" x="60"  y="260" width="98" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="109" y="282" text-anchor="middle" fill="#712b13">WS-01</text>
<text class="ts" x="109" y="299" text-anchor="middle" fill="#993c1d">10K conns</text>
<text class="ts" x="109" y="315" text-anchor="middle" fill="#993c1d">BLR zones</text>

<rect class="box-coral" x="182" y="260" width="98" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="231" y="282" text-anchor="middle" fill="#712b13">WS-02</text>
<text class="ts" x="231" y="299" text-anchor="middle" fill="#993c1d">10K conns</text>
<text class="ts" x="231" y="315" text-anchor="middle" fill="#993c1d">MUM zones</text>

<rect class="box-coral" x="291" y="260" width="98" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="282" text-anchor="middle" fill="#712b13">WS-03</text>
<text class="ts" x="340" y="299" text-anchor="middle" fill="#993c1d">10K conns</text>
<text class="ts" x="340" y="315" text-anchor="middle" fill="#993c1d">DEL zones</text>

<rect class="box-coral" x="402" y="260" width="98" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="451" y="282" text-anchor="middle" fill="#712b13">WS-04</text>
<text class="ts" x="451" y="299" text-anchor="middle" fill="#993c1d">10K conns</text>
<text class="ts" x="451" y="315" text-anchor="middle" fill="#993c1d">HYD zones</text>

<rect class="box-coral" x="520" y="260" width="100" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="570" y="282" text-anchor="middle" fill="#712b13">WS-300</text>
<text class="ts" x="570" y="299" text-anchor="middle" fill="#993c1d">10K conns</text>
<text class="ts" x="570" y="315" text-anchor="middle" fill="#993c1d">…</text>

<!-- WS → Kafka (dashed) -->
<line x1="109" y1="330" x2="200" y2="400" stroke="#993C1D" stroke-width="0.8" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
<line x1="231" y1="330" x2="256" y2="400" stroke="#993C1D" stroke-width="0.8" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
<line x1="340" y1="330" x2="340" y2="400" stroke="#993C1D" stroke-width="0.8" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
<line x1="451" y1="330" x2="424" y2="400" stroke="#993C1D" stroke-width="0.8" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
<line x1="570" y1="330" x2="480" y2="400" stroke="#993C1D" stroke-width="0.8" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

<!-- Kafka -->
<rect class="box-amber" x="160" y="402" width="360" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="425" text-anchor="middle" fill="#633806">Kafka — consumer group: ws-broadcast</text>
<text class="ts" x="340" y="443" text-anchor="middle" fill="#854f0b">Each instance owns a partition slice — no duplicate broadcasts</text>

<!-- Redis -->
<rect class="box-teal" x="160" y="490" width="360" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="513" text-anchor="middle" fill="#085041">Redis — cold-start snapshot</text>
<text class="ts" x="340" y="531" text-anchor="middle" fill="#0f6e56">New connection reads current state immediately from cache</text>

<line x1="340" y1="458" x2="340" y2="488" stroke="#BA7517" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

<!-- Footer -->
<text class="ts" x="340" y="568" text-anchor="middle" fill="#888">3M users ÷ 10K connections per instance = 300 WS server instances</text>
</svg>
