<svg width="100%" viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Without vs. with Kafka — producer/consumer coupling</title>
<desc>Left side shows a messy mesh of direct connections between three producers and four consumers. Right side shows the same producers and consumers connected cleanly through a single Kafka log.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; fill: #444; }
    .box-coral { fill: #faece7; stroke: #993c1d; }
    .box-gray  { fill: #f1efe8; stroke: #5f5e5a; }
    .box-amber { fill: #faeeda; stroke: #854f0b; }
  </style>
</defs>

<!-- LEFT: Without Kafka -->
<text class="ts" x="160" y="28" text-anchor="middle" fill="#666">Without Kafka</text>

<rect class="box-coral" x="40"  y="50"  width="110" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="95"  y="68"  text-anchor="middle" fill="#712b13">Pricing eng.</text>
<rect class="box-coral" x="40"  y="170" width="110" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="95"  y="188" text-anchor="middle" fill="#712b13">ETA engine</text>
<rect class="box-coral" x="40"  y="290" width="110" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="95"  y="308" text-anchor="middle" fill="#712b13">Stock tracker</text>

<rect class="box-gray" x="190" y="50"  width="100" height="40" rx="6" stroke-width="0.5"/>
<text class="ts"  x="240" y="74"  text-anchor="middle">Redis writer</text>
<rect class="box-gray" x="190" y="140" width="100" height="40" rx="6" stroke-width="0.5"/>
<text class="ts"  x="240" y="164" text-anchor="middle">WebSocket</text>
<rect class="box-gray" x="190" y="230" width="100" height="40" rx="6" stroke-width="0.5"/>
<text class="ts"  x="240" y="254" text-anchor="middle">Analytics</text>
<rect class="box-gray" x="190" y="320" width="100" height="40" rx="6" stroke-width="0.5"/>
<text class="ts"  x="240" y="344" text-anchor="middle">ML pipeline</text>

<!-- Spaghetti arrows -->
<line x1="150" y1="65"  x2="188" y2="65"  stroke="#D85A30" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.7"/>
<line x1="150" y1="68"  x2="188" y2="152" stroke="#D85A30" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.7" fill="none"/>
<line x1="150" y1="70"  x2="188" y2="242" stroke="#D85A30" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.6" fill="none"/>
<line x1="150" y1="72"  x2="188" y2="332" stroke="#D85A30" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.5" fill="none"/>
<line x1="150" y1="185" x2="188" y2="72"  stroke="#993C1D" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.6" fill="none"/>
<line x1="150" y1="188" x2="188" y2="158" stroke="#993C1D" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.7" fill="none"/>
<line x1="150" y1="190" x2="188" y2="245" stroke="#993C1D" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.7" fill="none"/>
<line x1="150" y1="192" x2="188" y2="335" stroke="#993C1D" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.5" fill="none"/>
<line x1="150" y1="305" x2="188" y2="75"  stroke="#712B13" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.5" fill="none"/>
<line x1="150" y1="308" x2="188" y2="162" stroke="#712B13" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.6" fill="none"/>
<line x1="150" y1="310" x2="188" y2="248" stroke="#712B13" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.7" fill="none"/>
<line x1="150" y1="312" x2="188" y2="338" stroke="#712B13" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.6" fill="none"/>

<text class="ts" x="160" y="398" text-anchor="middle" fill="#c0392b">12 direct couplings</text>
<text class="ts" x="160" y="416" text-anchor="middle" fill="#888">Add 1 consumer = 3 more connections</text>

<!-- Divider -->
<line x1="340" y1="30" x2="340" y2="390" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- RIGHT: With Kafka -->
<text class="ts" x="510" y="28" text-anchor="middle" fill="#666">With Kafka</text>

<rect class="box-coral" x="360" y="50"  width="110" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="415" y="68"  text-anchor="middle" fill="#712b13">Pricing eng.</text>
<rect class="box-coral" x="360" y="170" width="110" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="415" y="188" text-anchor="middle" fill="#712b13">ETA engine</text>
<rect class="box-coral" x="360" y="290" width="110" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="415" y="308" text-anchor="middle" fill="#712b13">Stock tracker</text>

<!-- Kafka log -->
<rect class="box-amber" x="490" y="155" width="70" height="90" rx="8" stroke-width="0.5"/>
<text class="th" x="525" y="188" text-anchor="middle" fill="#633806">Kafka</text>
<text class="ts" x="525" y="207" text-anchor="middle" fill="#854f0b">log</text>
<text class="ts" x="525" y="224" text-anchor="middle" fill="#854f0b">TTL: 7d</text>

<rect class="box-gray" x="580" y="50"  width="90" height="40" rx="6" stroke-width="0.5"/>
<text class="ts" x="625" y="74"  text-anchor="middle">Redis writer</text>
<rect class="box-gray" x="580" y="140" width="90" height="40" rx="6" stroke-width="0.5"/>
<text class="ts" x="625" y="164" text-anchor="middle">WebSocket</text>
<rect class="box-gray" x="580" y="230" width="90" height="40" rx="6" stroke-width="0.5"/>
<text class="ts" x="625" y="254" text-anchor="middle">Analytics</text>
<rect class="box-gray" x="580" y="320" width="90" height="40" rx="6" stroke-width="0.5"/>
<text class="ts" x="625" y="344" text-anchor="middle">ML pipeline</text>

<!-- Producers → Kafka -->
<line x1="470" y1="70"  x2="488" y2="185" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="470" y1="190" x2="488" y2="200" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="470" y1="310" x2="488" y2="225" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Kafka → Consumers -->
<line x1="560" y1="185" x2="578" y2="72"  stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="560" y1="195" x2="578" y2="162" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="560" y1="205" x2="578" y2="252" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="560" y1="215" x2="578" y2="342" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<text class="ts" x="510" y="398" text-anchor="middle" fill="#27ae60">7 connections total, forever</text>
<text class="ts" x="510" y="416" text-anchor="middle" fill="#888">Add 1 consumer = 1 more connection</text>
</svg>
