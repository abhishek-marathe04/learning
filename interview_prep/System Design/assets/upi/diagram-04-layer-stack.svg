<svg width="100%" viewBox="0 0 680 480" role="img">
<title>UPI participant layer stack</title>
<desc>Four-layer diagram: end users → TPAPs (PhonePe, GPay, Paytm) → PSP banks (Yes Bank, Axis, SBI, HDFC) → NPCI switch → member banks</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer 4: User -->
<rect x="40" y="20" width="600" height="52" rx="10" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="6 3"/>
<text font-size="12" x="56" y="44" fill="#888780">Layer 4 — user</text>
<text font-size="14" x="340" y="52" text-anchor="middle" dominant-baseline="central" fill="#444441">End user (you, on your phone)</text>

<!-- Layer 3: TPAP -->
<rect x="40" y="90" width="600" height="80" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text font-size="12" x="56" y="108" fill="#534AB7">Layer 3 — TPAP (Third Party App Provider)</text>

<rect x="60" y="112" width="120" height="44" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="120" y="134" text-anchor="middle" dominant-baseline="central" fill="#3C3489">PhonePe</text>

<rect x="200" y="112" width="120" height="44" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="260" y="134" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Google Pay</text>

<rect x="340" y="112" width="120" height="44" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="400" y="134" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Paytm app</text>

<rect x="480" y="112" width="140" height="44" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="550" y="134" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Amazon Pay etc.</text>

<!-- Annotation -->
<text font-size="12" x="400" y="161" fill="#534AB7">No NPCI connection. No money held.</text>

<!-- Layer 2: PSP Banks -->
<rect x="40" y="188" width="600" height="80" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text font-size="12" x="56" y="206" fill="#0F6E56">Layer 2 — PSP banks (NPCI members, UPI licensed)</text>

<rect x="60" y="210" width="160" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="140" y="226" text-anchor="middle" dominant-baseline="central" fill="#085041">Yes Bank</text>
<text font-size="12" x="140" y="244" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">PhonePe's PSP</text>

<rect x="240" y="210" width="160" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="320" y="226" text-anchor="middle" dominant-baseline="central" fill="#085041">Axis / SBI / HDFC</text>
<text font-size="12" x="320" y="244" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">GPay's multi-PSP</text>

<rect x="420" y="210" width="200" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="520" y="226" text-anchor="middle" dominant-baseline="central" fill="#085041">Paytm Payments Bank</text>
<text font-size="12" x="520" y="244" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">own PSP (restricted)</text>

<!-- Arrow -->
<line x1="340" y1="268" x2="340" y2="298" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<text font-size="12" x="380" y="287" fill="#888780">ISO 8583 / mTLS</text>

<!-- Layer 1: NPCI -->
<rect x="40" y="298" width="600" height="52" rx="10" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="318" text-anchor="middle" dominant-baseline="central" fill="#712B13">NPCI UPI switch</text>
<text font-size="12" x="340" y="338" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Central router — only layer that talks to all banks</text>

<line x1="340" y1="350" x2="340" y2="380" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Layer 0: Member banks -->
<rect x="40" y="380" width="600" height="60" rx="10" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-size="12" x="56" y="398" fill="#888780">Layer 1 — member banks (your actual money lives here)</text>
<text font-size="14" x="340" y="420" text-anchor="middle" dominant-baseline="central" fill="#444441">HDFC, SBI, ICICI, Kotak, Axis … (250+ banks)</text>
</svg>
